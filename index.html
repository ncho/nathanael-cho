<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathanael Cho</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>
      Nathanael Cho
      <span>Los Angeles, CA</span>
    </h1>
  </header>
  <main>
    <canvas id="topoMap"></canvas>
  </main>
  <footer>
    &copy; 2026
  </footer>

<script>
function generateTopoMap() {
  const canvas = document.getElementById('topoMap');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const main = canvas.parentElement;

  const width = main.clientWidth;
  const height = main.clientHeight;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, width, height);

  // Random seed for variation
  const seedX = Math.random() * 1000;
  const seedY = Math.random() * 1000;

  // Noise for terrain
  function noise(x, y) {
    x += seedX; y += seedY;
    return (
      Math.sin(x*0.01) + Math.sin(y*0.01) + Math.sin((x+y)*0.008) + Math.sin(Math.sqrt(x*x+y*y)*0.02)
    ) * 0.25;
  }

  // Terrain elevation function
  function getElevation(x, y) {
    let e = 0;

    // Coastal slope: west low, east high
    e += (x / width) * 1.2;

    // Santa Monica Mountains NW-SE ridge
    e += Math.sin((x*0.006) + (y*0.006)) * 1.0;

    // San Fernando Valley basin flattening
    const valleyCenterX = width*0.45;
    const valleyCenterY = height*0.55;
    const dx = (x - valleyCenterX)/(width*0.35);
    const dy = (y - valleyCenterY)/(height*0.35);
    e -= Math.exp(-(dx*dx + dy*dy)) * 1.5;

    // Layered micro-noise for terrain detail
    e += noise(x, y) + 0.5*noise(x*2, y*2) + 0.25*noise(x*4, y*4);

    return e;
  }

  // Draw contour lines
  const contourLevels = 28;
  const gridSize = 5;

  ctx.strokeStyle = 'rgba(0,0,0,0.65)';

  for (let level=0; level<contourLevels; level++) {
    const threshold = -1.5 + (level/contourLevels) * 4;

    ctx.beginPath();
    ctx.lineWidth = (level % 5 === 0) ? 1.4 : 0.7;

    for (let y = 0; y < height; y += gridSize) {
      ctx.moveTo(0, y);
      for (let x = 0; x <= width; x += 2) {
        // Elevation at this point
        const e = getElevation(x, y);
        // Map to vertical offset: lines dip for hills, rise for valleys
        const yOffset = y - (e * 15); 
        ctx.lineTo(x, yOffset);
      }
    }
    ctx.stroke();
  }
}

window.addEventListener('load', generateTopoMap);
window.addEventListener('resize', generateTopoMap);
</script>
</body>
</html>
