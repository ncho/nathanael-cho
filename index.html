<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nathanael Cho</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>
      Nathanael Cho
      <span>Los Angeles, CA</span>
    </h1>
  </header>
  <main>
    <canvas id="topoMap"></canvas>
  </main>
  <footer>
    &copy; 2026
  </footer>

<script>
function generateTopoMap() {
  const canvas = document.getElementById('topoMap');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const main = canvas.parentElement;

  const width = main.clientWidth;
  const height = main.clientHeight;

  const dpr = window.devicePixelRatio || 1;
  canvas.width = width * dpr;
  canvas.height = height * dpr;
  canvas.style.width = width + 'px';
  canvas.style.height = height + 'px';
  ctx.scale(dpr, dpr);

  ctx.clearRect(0, 0, width, height);

  // Random seed for line variation
  const seed = Math.random() * 1000;

  function noise(x) {
    return Math.sin(x * 0.02 + seed) * 10 + Math.sin(x * 0.05 + seed*2) * 5;
  }

  const lines = 28;
  const spacing = height / lines;

  ctx.strokeStyle = 'rgba(0,0,0,0.65)';

  for (let i = 0; i < lines; i++) {
    const yBase = i * spacing;
    ctx.beginPath();
    ctx.lineWidth = (i % 5 === 0) ? 1.4 : 0.7;

    for (let x = 0; x <= width; x += 2) {
      const y = yBase + noise(x);
      if (x === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

window.addEventListener('load', generateTopoMap);
window.addEventListener('resize', generateTopoMap);
</script>
</body>
</html>
